name: CI

# Pitch-Vertrauen: bei jedem Push/PR laufen die End-to-End-Smoke-Tests.
# Das Backend ist dependency-frei → kein "npm install" nötig, Lauf in Sekunden.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: API-Smoke-Tests (End-to-End)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node ${{ matrix.node-version }} einrichten
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Smoke-Tests ausführen
        run: npm test
